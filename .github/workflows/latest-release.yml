name: Build and Publish Latest Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: latest-release
    cancel-in-progress: true

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      script: build.sh
                      artifact: total-score-linux-x64
                      built_file: dist/total-score-linux-x64
                    - os: macos-latest
                      script: build-mac.sh
                      artifact: total-score-macos-x64
                      built_file: dist/total-score-macos-x64
                    - os: windows-latest
                      script: build.bat
                      artifact: total-score-windows-x64
                      built_file: dist/total-score-windows-x64.exe
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: python -m pip install --upgrade pip pyinstaller -r requirements.txt

            - name: Build on Linux or macOS
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  chmod +x ${{ matrix.script }}
                  ./${{ matrix.script }}

            - name: Build on Windows
              if: runner.os == 'Windows'
              shell: cmd
              run: call ${{ matrix.script }}

            - name: Upload build output
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.built_file }}
                  if-no-files-found: error

    release:
        name: Publish Latest Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Recreate the latest release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release delete latest --repo ${{ github.repository }} --yes --cleanup-tag || true
                  gh release create latest release-assets/* \
                    --repo ${{ github.repository }} \
                    --target ${{ github.sha }} \
                    --title "Latest" \
                    --latest \
                    --notes "Automated build from commit ${{ github.sha }}"
